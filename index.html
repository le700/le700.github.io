<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>岳金豪 | Developer</title>
  <meta name="description" content="岳金豪 - 嵌入式开发与机器人算法">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-secondary: #111113;
      --text: #f5f5f7;
      --text-secondary: #a0a0a5;
      --accent: #7c9a6a;
      --accent-glow: rgba(124, 154, 106, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    /* Physics Container */
    #physics-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* UI Layer */
    #ui-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* Physics Elements */
    .physics-element {
      position: absolute;
      transform-origin: center center;
      will-change: transform;
      cursor: grab;
      user-select: none;
      pointer-events: auto;
    }

    .physics-element:active {
      cursor: grabbing;
    }

    /* Hero Title */
    .hero-title-container {
      position: absolute;
      left: 50%;
      top: 15%;
      transform: translateX(-50%);
      text-align: center;
    }

    .hero-name {
      font-size: clamp(60px, 12vw, 140px);
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 50%, var(--text) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 80px var(--accent-glow);
      white-space: nowrap;
    }

    .hero-subtitle {
      font-size: clamp(14px, 2vw, 18px);
      color: var(--text-secondary);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 16px;
    }

    /* Physics Cards */
    .project-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 24px;
      width: 320px;
      backdrop-filter: blur(10px);
    }

    .project-card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .project-card p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .project-card .tech-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .project-card .tech-tag {
      font-size: 11px;
      padding: 4px 10px;
      background: rgba(124,154,106,0.15);
      border-radius: 100px;
      color: var(--accent);
    }

    /* Award Balls */
    .award-ball {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(124,154,106,0.2), rgba(124,154,106,0.05));
      border: 2px solid rgba(124,154,106,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .award-ball .icon {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .award-ball .title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .award-ball .detail {
      font-size: 9px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Skill Blocks */
    .skill-block {
      padding: 16px 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    /* Contact Blocks */
    .contact-block {
      padding: 20px 32px;
      background: rgba(124,154,106,0.1);
      border: 1px solid rgba(124,154,106,0.3);
      border-radius: 16px;
      text-align: center;
    }

    .contact-block .icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .contact-block .label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .contact-block .value {
      font-size: 13px;
      color: var(--text);
    }

    /* Controls */
    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      pointer-events: auto;
    }

    .control-btn {
      padding: 12px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .control-btn:hover {
      background: rgba(124,154,106,0.2);
      border-color: var(--accent);
    }

    .control-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    /* Instructions */
    .instructions {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 100;
      font-size: 12px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .instructions span {
      color: var(--accent);
    }

    /* Gravity Indicator */
    .gravity-indicator {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 100;
      text-align: right;
      pointer-events: none;
    }

    .gravity-value {
      font-size: 48px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .gravity-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <!-- Physics Canvas -->
  <div id="physics-container"></div>

  <!-- UI Layer -->
  <div id="ui-layer">
    <!-- Instructions -->
    <div class="instructions">
      <div><span>拖拽</span> 抛掷元素</div>
      <div><span>点击</span> 施加冲击力</div>
      <div><span>悬停</span> 产生引力场</div>
    </div>

    <!-- Gravity Indicator -->
    <div class="gravity-indicator">
      <div class="gravity-value" id="gravity-value">1.0</div>
      <div class="gravity-label">Gravity</div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="control-btn" id="btn-zero-g">零重力</button>
      <button class="control-btn active" id="btn-normal-g">正常重力</button>
      <button class="control-btn" id="btn-high-g">高重力</button>
      <button class="control-btn" id="btn-scatter">打散</button>
      <button class="control-btn" id="btn-reset">重置</button>
    </div>
  </div>

  <script>
    // Matter.js aliases
    const Engine = Matter.Engine,
          Render = Matter.Render,
          Runner = Matter.Runner,
          Bodies = Matter.Bodies,
          Composite = Matter.Composite,
          Events = Matter.Events,
          Mouse = Matter.Mouse,
          MouseConstraint = Matter.MouseConstraint,
          Body = Matter.Body,
          Vector = Matter.Vector;

    // Create engine
    const engine = Engine.create();
    const world = engine.world;

    // Canvas dimensions
    const width = window.innerWidth;
    const height = window.innerHeight;

    // Create renderer
    const render = Render.create({
      element: document.getElementById('physics-container'),
      engine: engine,
      options: {
        width: width,
        height: height,
        wireframes: false,
        background: 'transparent',
        pixelRatio: window.devicePixelRatio
      }
    });

    // Create boundaries
    const wallThickness = 100;
    const walls = [
      Bodies.rectangle(width/2, height + wallThickness/2, width + 200, wallThickness, { 
        isStatic: true, 
        render: { visible: false },
        friction: 0.5,
        restitution: 0.3
      }),
      Bodies.rectangle(width/2, -wallThickness*2, width + 200, wallThickness, { 
        isStatic: true, 
        render: { visible: false } 
      }),
      Bodies.rectangle(-wallThickness/2, height/2, wallThickness, height * 2, { 
        isStatic: true, 
        render: { visible: false } 
      }),
      Bodies.rectangle(width + wallThickness/2, height/2, wallThickness, height * 2, { 
        isStatic: true, 
        render: { visible: false } 
      })
    ];
    Composite.add(world, walls);

    // Store physics bodies with their DOM elements
    const physicsElements = [];

    // Helper: Create physics body with DOM element
    function createPhysicsElement(x, y, width, height, options = {}) {
      const body = Bodies.rectangle(x, y, width, height, {
        restitution: 0.6,
        friction: 0.3,
        frictionAir: 0.01,
        ...options
      });
      
      const domEl = document.createElement('div');
      domEl.className = 'physics-element';
      domEl.style.width = width + 'px';
      domEl.style.height = height + 'px';
      document.getElementById('ui-layer').appendChild(domEl);
      
      physicsElements.push({ body, domEl, width, height });
      Composite.add(world, body);
      
      return { body, domEl };
    }

    // Helper: Create circle body
    function createPhysicsCircle(x, y, radius, options = {}) {
      const body = Bodies.circle(x, y, radius, {
        restitution: 0.7,
        friction: 0.2,
        frictionAir: 0.01,
        ...options
      });
      
      const domEl = document.createElement('div');
      domEl.className = 'physics-element';
      domEl.style.width = radius * 2 + 'px';
      domEl.style.height = radius * 2 + 'px';
      document.getElementById('ui-layer').appendChild(domEl);
      
      physicsElements.push({ body, domEl, width: radius * 2, height: radius * 2 });
      Composite.add(world, body);
      
      return { body, domEl };
    }

    // Create Hero Title (Static at top)
    const heroContainer = document.createElement('div');
    heroContainer.className = 'hero-title-container';
    heroContainer.innerHTML = `
      <div class="hero-name">岳金豪</div>
      <div class="hero-subtitle">Developer & Robotics Engineer</div>
    `;
    document.getElementById('ui-layer').appendChild(heroContainer);

    // Create Project Cards
    const projects = [
      { title: '仿人机器人视觉控制系统', desc: '基于树莓派的视觉感知系统，实现人脸识别、物体抓取', tech: ['Python', 'OpenCV', 'YOLOv5'] },
      { title: '开源技术研究与贡献', desc: 'GitHub 开源项目，AI工具与Skill开发', tech: ['Git', 'AI Tools'] },
      { title: '危化品仓储监控系统', desc: '市级科研项目，YOLOv5目标检测', tech: ['YOLOv5', 'STM32'] }
    ];

    projects.forEach((proj, i) => {
      const { domEl } = createPhysicsElement(
        150 + i * 350, 
        200 + Math.random() * 100, 
        320, 
        180,
        { chamfer: { radius: 20 } }
      );
      
      domEl.className = 'physics-element project-card';
      domEl.innerHTML = `
        <h3>${proj.title}</h3>
        <p>${proj.desc}</p>
        <div class="tech-tags">
          ${proj.tech.map(t => `<span class="tech-tag">${t}</span>`).join('')}
        </div>
      `;
    });

    // Create Award Balls
    const awards = [
      { icon: '🏆', title: '世界人形机器人运动会', detail: '1500m项目' },
      { icon: '🥈', title: '中国机器人大赛', detail: '国家级二等奖' },
      { icon: '🥉', title: '信息安全对抗赛', detail: '国家级三等奖' },
      { icon: '🥇', title: '京南AI大赛', detail: '省级一等奖' },
      { icon: '🥇', title: '北京市机器人大赛', detail: '省级一等奖' },
      { icon: '🏅', title: '机器人及AI大赛', detail: '省级多奖项' },
      { icon: '🥈', title: '华北五省市大赛', detail: '省级二等奖' },
      { icon: '🥉', title: '电子设计竞赛', detail: '省级三等奖' }
    ];

    awards.forEach((award, i) => {
      const { domEl } = createPhysicsCircle(
        width - 150 - (i % 4) * 140,
        350 + Math.floor(i / 4) * 150,
        60
      );
      
      domEl.className = 'physics-element award-ball';
      domEl.innerHTML = `
        <div class="icon">${award.icon}</div>
        <div class="title">${award.title}</div>
        <div class="detail">${award.detail}</div>
      `;
    });

    // Create Skill Blocks
    const skills = ['Python', 'C/C++', 'OpenCV', 'YOLOv5', 'STM32', '树莓派', 'Git', 'Linux', 'Docker', '嵌入式'];
    
    skills.forEach((skill, i) => {
      const { domEl } = createPhysicsElement(
        100 + Math.random() * (width - 200),
        height - 300 + Math.random() * 150,
        100,
        50,
        { chamfer: { radius: 12 } }
      );
      
      domEl.className = 'physics-element skill-block';
      domEl.innerHTML = skill;
    });

    // Create Contact Blocks
    const contacts = [
      { icon: '📱', label: '电话', value: '18637473189' },
      { icon: '✉️', label: '邮箱', value: '3189311520@qq.com' },
      { icon: '💻', label: 'GitHub', value: 'github.com/le700' }
    ];

    contacts.forEach((contact, i) => {
      const { domEl } = createPhysicsElement(
        width/2 - 200 + i * 200,
        height - 150,
        140,
        100,
        { chamfer: { radius: 16 } }
      );
      
      domEl.className = 'physics-element contact-block';
      domEl.innerHTML = `
        <div class="icon">${contact.icon}</div>
        <div class="label">${contact.label}</div>
        <div class="value">${contact.value}</div>
      `;
    });

    // Mouse constraint for dragging
    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
      mouse: mouse,
      constraint: {
        stiffness: 0.2,
        render: { visible: false }
      }
    });
    Composite.add(world, mouseConstraint);

    // Keep mouse in sync with rendering
    render.mouse = mouse;

    // Mouse attraction/repulsion force
    let mouseAttract = true;
    
    Events.on(engine, 'beforeUpdate', function() {
      const mousePosition = mouse.position;
      
      physicsElements.forEach(({ body }) => {
        const bodyPos = body.position;
        const dist = Vector.magnitude(Vector.sub(mousePosition, bodyPos));
        
        if (dist < 300 && dist > 50) {
          const force = Vector.mult(
            Vector.normalise(Vector.sub(mousePosition, bodyPos)),
            mouseAttract ? 0.0005 : -0.0005
          );
          Body.applyForce(body, bodyPos, force);
        }
      });
    });

    // Update DOM elements to match physics bodies
    Events.on(render, 'afterRender', function() {
      physicsElements.forEach(({ body, domEl, width, height }) => {
        domEl.style.transform = `translate(${body.position.x - width/2}px, ${body.position.y - height/2}px) rotate(${body.angle}rad)`;
      });
    });

    // Run engine and renderer
    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    // Controls
    document.getElementById('btn-zero-g').addEventListener('click', function() {
      engine.gravity.y = 0;
      updateGravityDisplay(0);
      setActiveBtn(this);
    });

    document.getElementById('btn-normal-g').addEventListener('click', function() {
      engine.gravity.y = 1;
      updateGravityDisplay(1);
      setActiveBtn(this);
    });

    document.getElementById('btn-high-g').addEventListener('click', function() {
      engine.gravity.y = 2.5;
      updateGravityDisplay(2.5);
      setActiveBtn(this);
    });

    document.getElementById('btn-scatter').addEventListener('click', function() {
      physicsElements.forEach(({ body }) => {
        Body.applyForce(body, body.position, {
          x: (Math.random() - 0.5) * 0.15,
          y: -0.1 - Math.random() * 0.1
        });
      });
    });

    document.getElementById('btn-reset').addEventListener('click', function() {
      location.reload();
    });

    function setActiveBtn(btn) {
      document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function updateGravityDisplay(g) {
      document.getElementById('gravity-value').textContent = g.toFixed(1);
    }

    // Click to apply explosive force
    render.canvas.addEventListener('click', function(e) {
      const rect = render.canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;
      
      physicsElements.forEach(({ body }) => {
        const dist = Vector.magnitude(Vector.sub({ x: clickX, y: clickY }, body.position));
        if (dist < 200) {
          const force = Vector.mult(
            Vector.normalise(Vector.sub(body.position, { x: clickX, y: clickY })),
            0.05 * (1 - dist / 200)
          );
          Body.applyForce(body, body.position, force);
        }
      });
    });

    // Handle resize
    window.addEventListener('resize', function() {
      render.canvas.width = window.innerWidth;
      render.canvas.height = window.innerHeight;
      render.options.width = window.innerWidth;
      render.options.height = window.innerHeight;
    });

    // Initial scatter animation
    setTimeout(() => {
      physicsElements.forEach(({ body }) => {
        Body.applyForce(body, body.position, {
          x: (Math.random() - 0.5) * 0.02,
          y: -0.02
        });
      });
    }, 500);
  </script>
</body>
</html>
